<!DOCTYPE html>
<html>
<head>
<title>Chat</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="nav">
<a href="/home">Home</a>
<a href="/chat">Chat</a>
<a href="/about">About</a>
</div>

<div class="container">
<h2>Chatbot 💬</h2>

<div id="chatbox" class="chatbox"></div>

<div class="suggestions">
<button onclick="quickMsg('hi')">Hi</button>
<button onclick="quickMsg('what is python')">Python</button>
<button onclick="quickMsg('what is html')">HTML</button>
<button onclick="quickMsg('what is chatbot')">Chatbot</button>
</div>

<input type="text" id="msg" placeholder="Type message...">
<button onclick="sendMsg()">Send</button>

</div>

<script>
function quickMsg(text) {
    document.getElementById("msg").value = text;
    sendMsg();
}

function sendMsg() {
    let msg = document.getElementById("msg").value;
    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += "<p><b>You:</b> " + msg + "</p>";

    fetch("/get", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: "msg=" + msg
    })
    .then(res => res.text())
    .then(data => {
        chatbox.innerHTML += "<p><b>Bot:</b> " + data + "</p>";
    });

    document.getElementById("msg").value = "";
}
</script>

</body>
</html>
